{% extends "base.html" %}

{% block content %}
<style>
    .login-wrapper {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
    }
    /* Animated background gradient */
    .login-wrapper::before {
        content: '';
        position: absolute;
        width: 200%;
        height: 200%;
        background: radial-gradient(circle at 20% 30%, rgba(255, 193, 7, 0.2), transparent 60%),
                    radial-gradient(circle at 80% 70%, rgba(56, 189, 248, 0.2), transparent 60%);
        animation: slowShift 12s ease infinite;
        z-index: -2;
    }
    @keyframes slowShift {
        0% { transform: translate(0, 0) rotate(0deg); }
        50% { transform: translate(-5%, -5%) rotate(2deg); }
        100% { transform: translate(0, 0) rotate(0deg); }
    }
    /* Floating particles (subtle) */
    .particle {
        position: absolute;
        background: rgba(255, 193, 7, 0.4);
        border-radius: 50%;
        pointer-events: none;
        animation: float 10s infinite ease-in-out;
        z-index: -1;
    }
    @keyframes float {
        0% { transform: translateY(0) translateX(0) scale(1); opacity: 0.3; }
        50% { transform: translateY(-40px) translateX(20px) scale(1.2); opacity: 0.8; }
        100% { transform: translateY(0) translateX(0) scale(1); opacity: 0.3; }
    }
    /* Main card */
    .login-card {
        background: rgba(10, 26, 18, 0.75);
        backdrop-filter: blur(14px);
        border-radius: 48px;
        padding: 2.5rem;
        width: 100%;
        max-width: 440px;
        border: 1px solid rgba(255, 193, 7, 0.3);
        box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.5);
        transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        animation: cardGlow 3s infinite alternate;
    }
    @keyframes cardGlow {
        0% { box-shadow: 0 25px 40px -10px rgba(0, 0, 0, 0.5); border-color: rgba(255, 193, 7, 0.3); }
        100% { box-shadow: 0 0 20px rgba(255, 193, 7, 0.3); border-color: rgba(255, 193, 7, 0.6); }
    }
    .login-card:hover {
        transform: translateY(-6px);
    }
    /* Typing effect */
    .welcome-text {
        font-size: 2rem;
        font-weight: 700;
        text-align: center;
        margin-bottom: 1.8rem;
        overflow: hidden;
        white-space: nowrap;
        border-right: 2px solid #ffc107;
        width: 0;
        animation: typing 1.5s steps(20, end) forwards, blink 0.75s step-end infinite;
    }
    @keyframes typing {
        from { width: 0; }
        to { width: 100%; }
    }
    @keyframes blink {
        from, to { border-color: transparent; }
        50% { border-color: #ffc107; }
    }
    /* Form fields */
    .form-group {
        margin-bottom: 1.5rem;
        animation: slideUp 0.4s ease-out forwards;
        opacity: 0;
        transform: translateY(15px);
    }
    .form-group:nth-child(1) { animation-delay: 0.1s; }
    .form-group:nth-child(2) { animation-delay: 0.2s; }
    .form-group label {
        display: block;
        font-size: 0.85rem;
        font-weight: 500;
        color: #cbd5e1;
        margin-bottom: 0.4rem;
    }
    .form-group input {
        width: 100%;
        padding: 0.8rem 1rem;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid #2a5a44;
        border-radius: 28px;
        color: #fff;
        font-size: 1rem;
        transition: all 0.2s;
    }
    .form-group input:focus {
        outline: none;
        border-color: #ffc107;
        box-shadow: 0 0 0 3px rgba(255, 193, 7, 0.2);
        transform: scale(1.01);
    }
    @keyframes slideUp {
        to { opacity: 1; transform: translateY(0); }
    }
    /* Button */
    .btn-login {
        background: linear-gradient(135deg, #ffc107, #ff8c00);
        width: 100%;
        padding: 0.8rem;
        border: none;
        border-radius: 40px;
        font-size: 1rem;
        font-weight: 700;
        color: #0a1a12;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 0.5rem;
        animation: pulse 2s infinite;
    }
    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(255, 193, 7, 0.4); }
        70% { box-shadow: 0 0 0 8px rgba(255, 193, 7, 0); }
        100% { box-shadow: 0 0 0 0 rgba(255, 193, 7, 0); }
    }
    .btn-login:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 25px rgba(255, 193, 7, 0.3);
        animation: none;
    }
    .signup-link {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.9rem;
        color: #94a3b8;
    }
    .signup-link a {
        color: #ffc107;
        text-decoration: none;
        font-weight: 600;
    }
    .signup-link a:hover {
        text-decoration: underline;
    }
</style>

<div class="login-wrapper">
    <div class="login-card">
        <div class="welcome-text">🔐 Welcome back</div>
        <form method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" required>
            </div>
            <button type="submit" class="btn-login">Sign in →</button>
        </form>
        <div class="signup-link">
            No account? <a href="{{ url_for('signup') }}">Create one</a>
        </div>
    </div>
</div>

<script>
    // Generate subtle floating particles
    (function() {
        const wrapper = document.querySelector('.login-wrapper');
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 5 + 2;
            p.style.width = size + 'px';
            p.style.height = size + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 8 + 's';
            p.style.animationDuration = 8 + Math.random() * 8 + 's';
            wrapper.appendChild(p);
        }
    })();
</script>
{% endblock %}
