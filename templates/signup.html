{% extends "base.html" %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 2rem auto;">
    <h2>Sign Up</h2>
    <form method="post">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" name="username" id="username" required>
        </div>
        <div class="form-group">
            <label for="email">Email (optional)</label>
            <input type="email" name="email" id="email">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" name="password" id="password" required>
            <small style="color: #aaa; font-size: 0.8rem;">Minimum 8 characters, at least one uppercase, one lowercase, one digit, and one special character.</small>
        </div>
        <div class="form-group">
            <label for="confirm">Confirm Password</label>
            <input type="password" name="confirm" id="confirm" required>
        </div>
        <button type="submit" class="btn">Create Account</button>
    </form>
    <p style="margin-top: 1rem;">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
</div>
{% endblock %}
